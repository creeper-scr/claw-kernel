name: Bug Report
description: Report a bug in claw-kernel
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: A clear description of what actually happened.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproduction code
      description: If applicable, provide minimal code that reproduces the issue
      render: rust

  - type: checkboxes
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) does this issue affect?
      options:
        - label: Linux
        - label: macOS
        - label: Windows
        - label: All platforms
        - label: Other (please specify in description)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: claw-kernel version
      description: What version of claw-kernel are you using?
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: rustc
    attributes:
      label: Rust version
      description: Output of `rustc --version` (project requires 1.83+)
      placeholder: e.g., rustc 1.83.0
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: Feature flags used
      description: Which cargo features were enabled?
      placeholder: |
        - engine-lua (default)
        - engine-v8
        - engine-py
        - Other: ...

  - type: dropdown
    id: execution_mode
    attributes:
      label: Execution mode
      description: Which execution mode does this issue relate to?
      options:
        - Safe Mode (default)
        - Power Mode (--power-mode)
        - Both (occurs in both modes)
        - Unknown / Not applicable
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues and this bug has not been reported
        - label: I have tested with the latest version
        - label: I can provide a minimal reproduction
