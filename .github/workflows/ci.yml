# claw-kernel CI Workflow
# Note: Build and test jobs are disabled until crate implementation begins
# Currently only documentation and formatting checks are enabled

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Documentation and formatting checks (enabled)
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

      - name: Check documentation links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 60 README.md AGENTS.md CONTRIBUTING.md SECURITY.md
        continue-on-error: true

  # Build job (enabled)
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    if: true
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, 1.83.0]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install platform dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libseccomp-dev pkg-config

      - name: Build (default features)
        run: cargo build --workspace

      - name: Build (all features)
        run: cargo build --workspace --all-features

  # Test job (enabled)
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    if: true
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, 1.83.0]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install platform dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libseccomp-dev pkg-config

      - name: Run tests
        run: cargo test --workspace

      - name: Run integration tests
        run: cargo test --workspace --features integration-tests

  # Documentation check (enabled)
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check documentation
        run: |
          # Check for required documentation files
          test -f README.md || echo "::error::README.md missing"
          test -f CONTRIBUTING.md || echo "::error::CONTRIBUTING.md missing"
          test -f SECURITY.md || echo "::error::SECURITY.md missing"
          test -f CODE_OF_CONDUCT.md || echo "::error::CODE_OF_CONDUCT.md missing"
          test -f LICENSE-MIT || echo "::error::LICENSE-MIT missing"
          test -f LICENSE-APACHE || echo "::error::LICENSE-APACHE missing"

      - name: Validate markdown
        uses: DavidAnson/markdownlint-cli2-action@v13
        with:
          globs: "**/*.md"
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }
        continue-on-error: true

  # Security audit (enabled)
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
