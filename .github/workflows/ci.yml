name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: test (unit)
        run: |
          cargo test -p claw-pal
          cargo test -p claw-runtime
          cargo test -p claw-provider
          cargo test -p claw-tools
          cargo test -p claw-loop
          cargo test -p claw-memory
          cargo test -p claw-channel
          cargo test -p claw-script
          cargo test -p claw-server
          cargo test -p claw-kernel
      - name: test (doc)
        run: |
          cargo test --doc -p claw-provider
          cargo test --doc -p claw-loop
          cargo test --doc -p claw-runtime
          cargo test --doc -p claw-tools
          cargo test --doc -p claw-memory
      - name: audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83"
      - uses: Swatinem/rust-cache@v2
      - name: test (unit, no script)
        run: |
          cargo test -p claw-pal
          cargo test -p claw-runtime
          cargo test -p claw-provider
          cargo test -p claw-tools
          cargo test -p claw-loop
          cargo test -p claw-memory
          cargo test -p claw-channel
          cargo test -p claw-server
          cargo test -p claw-kernel

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83"
      - uses: Swatinem/rust-cache@v2
      - name: test (unit, no script)
        run: |
          cargo test -p claw-pal
          cargo test -p claw-runtime
          cargo test -p claw-provider
          cargo test -p claw-tools
          cargo test -p claw-loop
          cargo test -p claw-memory
          cargo test -p claw-server
          cargo test -p claw-kernel

  build-release:
    name: Build release binary
    runs-on: ubuntu-latest
    needs: [test-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83"
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release -p claw-kernel-server
